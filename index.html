<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Tenant Sales Agent</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:700px;
    height:90vh;
    background:white;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
    display:flex;
    flex-direction:column;
}

.header{
    padding:15px;
    border-bottom:1px solid #ddd;
}

.header h2{
    margin-bottom:10px;
}

select{
    width:100%;
    padding:10px;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
    background:#fafafa;
}

.message{
    margin-bottom:15px;
    display:flex;
}

.user{
    justify-content:flex-end;
}

.bot{
    justify-content:flex-start;
}

.bubble{
    max-width:70%;
    padding:12px 16px;
    border-radius:12px;
    line-height:1.4;
}

.user .bubble{
    background:#2563eb;
    color:white;
}

.bot .bubble{
    background:#e5e7eb;
}

.footer{
    display:flex;
    gap:10px;
    padding:15px;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    padding:12px;
    font-size:16px;
}

button{
    padding:12px 20px;
    cursor:pointer;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:5px;
}

button:hover{
    background:#1d4ed8;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">

        <h2>Multi-Tenant Sales Agent</h2>

        <select id="tenant">
            <option value="org_1|branch_a">
                Cafe 24 AJNG-  KTM Branch
            </option>

            <option value="org_1|branch_b">
                AJNG Corp — PKR Branch
            </option>

            <option value="org_2|branch_a">
                AJNG2 Inc — Main Branch
            </option>

        </select>

    </div>

    <div class="chat" id="chat">

        <div class="message bot">
            <div class="bubble">
                Hello! How can I help you today?
            </div>
        </div>

    </div>

    <div class="footer">

        <input
            id="message"
            placeholder="Type your message..."
        />

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script>

const API = "http://localhost:8000/chat";

const sessionId = crypto.randomUUID();

const chat = document.getElementById("chat");

function addMessage(text, role){

    const wrapper = document.createElement("div");

    wrapper.className = "message " + role;

    wrapper.innerHTML = `
        <div class="bubble">${text}</div>
    `;

    chat.appendChild(wrapper);

    chat.scrollTop = chat.scrollHeight;
}

async function sendMessage(){

    const input = document.getElementById("message");

    const text = input.value.trim();

    if(text === "")
        return;

    addMessage(text,"user");

    input.value="";

    const tenant = document.getElementById("tenant").value.split("|");

    try{

        const response = await fetch(API,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                orgId:tenant[0],
                branchId:tenant[1],
                sessionId:sessionId,
                message:text
            })
        });

        const data = await response.json();

        addMessage(data.reply,"bot");

    }catch(err){

        console.error(err);

        addMessage("Unable to connect to backend.","bot");

    }

}

document.getElementById("message")
.addEventListener("keypress",function(e){

    if(e.key==="Enter")
        sendMessage();

});

</script>

</body>
</html>
