name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  docker:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: main
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "DOCKER_USERNAME is empty"
          else
            echo "DOCKER_USERNAME exists"
          fi

          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "DOCKER_PASSWORD is empty"
          else
            echo "DOCKER_PASSWORD exists"
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build \
            -f docker/Dockerfile.api \
            -t ajngworks/sales-agent:latest \
            -t ajngworks/sales-agent:${{ github.sha }} .

      - name: Push latest
        run: docker push ajngworks/sales-agent:latest

      - name: Push version
        run: docker push ajngworks/sales-agent:${{ github.sha }}