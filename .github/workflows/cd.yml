name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  docker:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build \
            -f docker/Dockerfile.api \
            -t ajngworks/sales-agent:latest \
            -t ajngworks/sales-agent:${{ github.sha }} .

      - name: Push latest
        run: docker push ajngworks/sales-agent:latest

      - name: Push version
        run: docker push ajngworks/sales-agent:${{ github.sha }}