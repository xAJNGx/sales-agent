services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - app/.env
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - agent-net
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-net
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  agent-net:
    driver: bridge